<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Avisos Rolox</title>
    <style>
        body { font-family: sans-serif; background: #050505; color: #e0e0e0; padding: 20px; }
        .card { background: #0f0f0f; padding: 20px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #333; }
        h1 { color: #fff; }
    </style>
</head>
<body>

    <h1>Avisos Rolox</h1>
    <div id="lista-avisos">Carregando...</div>

    <script>
        // Substitua pelo ID do seu projeto Supabase
        const PROJETO_ID = 'ihtakgynlqspapccuwur'; 
        const URL = `https://${PROJETO_ID}.supabase.co/rest/v1/avisos?select=*&order=data_criacao.desc`;

        async function carregar() {
            try {
                const response = await fetch(URL, {
                    headers: { "apikey": "IGNORE" } // Apenas um valor vazio para o Supabase não reclamar
                });
                
                const data = await response.json();
                
                document.getElementById('lista-avisos').innerHTML = data.map(a => `
                    <div class="card">
                        <h3>${a.titulo}</h3>
                        <p>${a.conteudo}</p>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('lista-avisos').innerText = "Erro na conexão.";
            }
        }

        carregar();
    </script>
</body>
</html>
